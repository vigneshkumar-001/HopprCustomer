name: Android Release (AAB)

on:
  workflow_dispatch:

jobs:
  build-aab:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Restore Android keystore from secrets
        shell: bash
        env:
          ANDROID_KEYSTORE_B64: ${{ secrets.ANDROID_KEYSTORE_B64 }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
        run: |
          set -euo pipefail

          if [[ -z "${ANDROID_KEYSTORE_B64:-}" ]]; then
            echo "Missing secret: ANDROID_KEYSTORE_B64"
            exit 1
          fi
          if [[ -z "${KEYSTORE_PASSWORD:-}" ]]; then
            echo "Missing secret: KEYSTORE_PASSWORD"
            exit 1
          fi
          if [[ -z "${KEY_PASSWORD:-}" ]]; then
            echo "Missing secret: KEY_PASSWORD"
            exit 1
          fi
          if [[ -z "${KEY_ALIAS:-}" ]]; then
            echo "Missing secret: KEY_ALIAS"
            exit 1
          fi

          mkdir -p android/keystore
          echo "$ANDROID_KEYSTORE_B64" | base64 --decode > android/keystore/upload-keystore.jks

          cat > android/key.properties <<EOF
          storePassword=$KEYSTORE_PASSWORD
          keyPassword=$KEY_PASSWORD
          keyAlias=$KEY_ALIAS
          storeFile=keystore/upload-keystore.jks
          EOF

      - name: Flutter pub get
        run: flutter pub get

      - name: Build release app bundle (AAB)
        run: flutter build appbundle --release

      - name: Upload artifact (AAB)
        uses: actions/upload-artifact@v4
        with:
          name: app-release-aab
          path: build/app/outputs/bundle/release/*.aab

